<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Intereses</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F5F3EE; --surface: #FFFFFF; --surface2: #EDEAE4;
  --border: rgba(0,0,0,0.09); --border2: rgba(0,0,0,0.16);
  --text: #1A1814; --text2: #6E6B65; --text3: #A8A49E;
  --green: #0A5E48; --green-bg: #CBF0E2; --green-mid: #18916A; --green-border: #8FD9BC;
  --amber: #6B3F07; --amber-bg: #FDEABF; --amber-mid: #C97D0A; --amber-border: #F0C355;
  --red: #721B1B; --red-bg: #FBDADA; --red-mid: #C03030; --red-border: #ECA0A0;
  --blue: #183E7A; --blue-bg: #D2E5F9;
  --radius: 12px; --radius-sm: 7px;
  --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
}
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; line-height: 1.5; }

/* TOPBAR */
.topbar { background: #1A1814; color: white; padding: 13px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 50; }
.topbar h1 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.topbar-right { display: flex; gap: 8px; align-items: center; }
.btn-top { background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); color: white; border-radius: 7px; padding: 7px 13px; font-size: 13px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background .15s; }
.btn-top:hover { background: rgba(255,255,255,.2); }
.btn-top.accent { background: var(--green-mid); border-color: var(--green-mid); }
.btn-top.accent:hover { background: var(--green); }
.sync-status { font-size: 12px; color: rgba(255,255,255,.5); display: flex; align-items: center; gap: 5px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #4CAF50; }
.sync-dot.syncing { background: var(--amber-mid); animation: pulse 1s infinite; }
.sync-dot.error { background: var(--red-mid); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

.main { max-width: 1080px; margin: 0 auto; padding: 22px 18px; }

/* SUMMARY */
.summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px,1fr)); gap: 10px; margin-bottom: 20px; }
.metric { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
.metric-label { font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--text2); margin-bottom: 5px; font-weight: 500; }
.metric-value { font-size: 20px; font-weight: 600; font-family: 'IBM Plex Mono', monospace; }
.metric-value.green { color: var(--green); }
.metric-value.amber { color: var(--amber-mid); }
.metric-value.red { color: var(--red-mid); }

/* BANNERS */
.banner { border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.banner.amber { background: var(--amber-bg); border: 1px solid var(--amber-border); }
.banner.setup { background: var(--blue-bg); border: 1px solid #8FBCE8; }
.banner-text { font-size: 13px; font-weight: 500; }
.banner.amber .banner-text { color: var(--amber); }
.banner.setup .banner-text { color: var(--blue); }
.banner-sub { font-size: 12px; margin-top: 2px; }
.banner.amber .banner-sub { color: #A07010; }
.banner.setup .banner-sub { color: #3A6FA8; }
.banner-val { font-family: 'IBM Plex Mono', monospace; font-size: 17px; font-weight: 700; white-space: nowrap; }
.banner.amber .banner-val { color: var(--amber); }
.btn-setup { background: var(--blue); color: white; border: none; border-radius: 6px; padding: 7px 13px; font-size: 13px; font-family: inherit; cursor: pointer; white-space: nowrap; }
.btn-setup:hover { background: #0F2E5E; }

/* DINERO SIN ASIGNAR */
.section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--text2); font-weight: 600; margin-bottom: 8px; }
.dinero-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px,1fr)); gap: 9px; margin-bottom: 20px; }
.dinero-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; gap: 10px; box-shadow: var(--shadow); }
.dinero-icon { width: 32px; height: 32px; border-radius: 8px; background: var(--amber-bg); color: var(--amber-mid); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.dinero-desc { font-size: 13px; font-weight: 500; color: var(--text); max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dinero-date { font-size: 11px; color: var(--text3); }
.dinero-right { text-align: right; }
.dinero-monto { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; color: var(--amber); }
.btn-asignar { margin-top: 5px; font-size: 11px; font-weight: 600; background: var(--green-mid); color: white; border: none; border-radius: 5px; padding: 3px 9px; cursor: pointer; font-family: inherit; }
.btn-asignar:hover { background: var(--green); }

/* TABS */
.tabs-wrap { margin-bottom: 18px; }
.tabs-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 3px; scrollbar-width: none; }
.tabs-scroll::-webkit-scrollbar { display: none; }
.tab-btn { flex-shrink: 0; padding: 9px 18px; border-radius: 9px; border: 1px solid var(--border2); background: var(--surface); font-family: inherit; cursor: pointer; transition: all .15s; display: flex; flex-direction: column; align-items: center; gap: 2px; }
.tab-btn:hover { background: var(--surface2); }
.tab-btn.active { background: #1A1814; border-color: #1A1814; }
.tab-day { font-size: 16px; font-weight: 700; font-family: 'IBM Plex Mono', monospace; color: var(--text); }
.tab-btn.active .tab-day { color: white; }
.tab-sub { font-size: 10px; text-transform: uppercase; letter-spacing: .05em; color: var(--text3); }
.tab-btn.active .tab-sub { color: rgba(255,255,255,.6); }
.tab-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; margin-top: 2px; background: var(--red-bg); color: var(--red-mid); }
.tab-btn.active .tab-badge { background: rgba(255,255,255,.2); color: white; }

/* RESPONSABLES */
.responsable-block { margin-bottom: 28px; }
.resp-header { display: flex; align-items: center; gap: 12px; margin-bottom: 13px; padding-bottom: 11px; border-bottom: 1px solid var(--border); }
.resp-avatar { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
.resp-name { font-size: 17px; font-weight: 600; }
.resp-info { font-size: 12px; color: var(--text2); }
.resp-estado { margin-left: auto; font-size: 13px; font-weight: 600; }
.resp-estado.ok { color: var(--green); }
.resp-estado.pend { color: var(--amber-mid); }

.prestamos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(295px,1fr)); gap: 13px; }

/* PRESTAMO CARD */
.pcard { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
.pcard-head { padding: 14px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 13px; }
.dia-grande { width: 58px; height: 58px; border-radius: 12px; background: #1A1814; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0; }
.dia-g-num { font-family: 'IBM Plex Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; }
.dia-g-label { font-size: 8px; text-transform: uppercase; letter-spacing: .05em; color: rgba(255,255,255,.5); margin-top: 3px; }
.pcard-info { flex: 1; min-width: 0; }
.pcard-capital { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 700; }
.pcard-cuota { font-size: 11px; color: var(--text2); margin-top: 2px; }
.pcard-desde { font-size: 11px; color: var(--text3); margin-top: 1px; }

.pcard-body { padding: 10px 13px; }

/* COBROS */
.mes-row { display: flex; align-items: center; justify-content: space-between; padding: 6px 9px; border-radius: 7px; margin-bottom: 4px; border: 1px solid transparent; }
.mes-row.pagado    { background: var(--green-bg);  border-color: var(--green-border); }
.mes-row.pendiente { background: var(--amber-bg);  border-color: var(--amber-border); }
.mes-row.vencido   { background: var(--red-bg);    border-color: var(--red-border); }
.mes-row.sin-cobro { background: var(--surface2);  border-color: var(--border); }
.mes-left { display: flex; align-items: center; gap: 8px; }
.mes-name { font-size: 13px; font-weight: 500; }
.mes-row.pagado .mes-name    { color: var(--green); }
.mes-row.pendiente .mes-name { color: var(--amber); }
.mes-row.vencido .mes-name   { color: var(--red); }
.mes-row.sin-cobro .mes-name { color: var(--text2); }
.mes-right { display: flex; align-items: center; gap: 5px; }
.mes-monto { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; }
.mes-row.pagado .mes-monto    { color: var(--green); }
.mes-row.pendiente .mes-monto { color: var(--amber); }
.mes-row.vencido .mes-monto   { color: var(--red); }
.mes-row.sin-cobro .mes-monto { color: var(--text3); }
.chk-btn { width: 22px; height: 22px; border-radius: 50%; border: 2px solid var(--border2); background: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: all .15s; padding: 0; color: transparent; }
.chk-btn:hover { border-color: var(--green-mid); }
.chk-btn.pagado { background: var(--green-mid); border-color: var(--green-mid); color: white; }
.icon-btn { width: 22px; height: 22px; border-radius: 5px; border: none; background: rgba(0,0,0,.06); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--text3); padding: 0; transition: all .12s; }
.icon-btn:hover { background: var(--red-bg); color: var(--red-mid); }
.btn-add-mes { width: 100%; margin-top: 7px; padding: 7px; border: 1px dashed var(--border2); border-radius: 7px; background: none; font-family: inherit; font-size: 12px; color: var(--text3); cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: all .15s; }
.btn-add-mes:hover { border-color: var(--green-mid); color: var(--green-mid); background: var(--green-bg); }
.desembolsos-wrap { margin-top: 5px; display: flex; flex-direction: column; gap: 2px; }
.desembolso-item { display: flex; align-items: center; justify-content: space-between; font-size: 11px; padding: 2px 0; }
.desembolso-monto { font-family: 'IBM Plex Mono', monospace; font-weight: 600; color: var(--text); }
.desembolso-fecha { color: var(--text3); }

.pcard-footer { border-top: 1px solid var(--border); display: flex; }
.foot-btn { flex: 1; padding: 9px; font-size: 12px; font-family: inherit; border: none; background: none; cursor: pointer; color: var(--text2); display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: 500; transition: background .12s; }
.foot-btn:hover { background: var(--surface2); color: var(--text); }
.foot-btn + .foot-btn { border-left: 1px solid var(--border); }
.foot-btn.danger:hover { color: var(--red-mid); background: var(--red-bg); }

/* MODAL */
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 200; padding: 16px; }
.modal { background: var(--surface); border-radius: 14px; width: 100%; max-width: 430px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 64px rgba(0,0,0,.22); }
.modal-head { padding: 17px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.modal-head h2 { font-size: 15px; font-weight: 600; }
.modal-close { background: var(--surface2); border: none; border-radius: 6px; width: 27px; height: 27px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text2); }
.modal-body { padding: 17px 20px; }
.form-group { margin-bottom: 12px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select { width: 100%; padding: 9px 11px; border: 1px solid var(--border2); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; background: var(--bg); color: var(--text); outline: none; transition: border-color .15s; }
.form-group input:focus, .form-group select:focus { border-color: var(--green-mid); }
.form-row { display: flex; gap: 9px; }
.form-row .form-group { flex: 1; }
.form-hint { font-size: 12px; color: var(--text3); margin-top: 4px; }
.dia-hint-box { background: var(--amber-bg); border-radius: 6px; padding: 8px 11px; font-size: 13px; color: var(--amber); font-weight: 500; margin-bottom: 10px; }
.modal-foot { padding: 13px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
.btn-cancel { flex: 1; padding: 9px; border: 1px solid var(--border2); border-radius: var(--radius-sm); background: none; font-family: inherit; font-size: 14px; cursor: pointer; color: var(--text2); }
.btn-cancel:hover { background: var(--surface2); }
.btn-save { flex: 2; padding: 9px; border: none; border-radius: var(--radius-sm); background: var(--green-mid); color: white; font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-save:hover { background: var(--green); }
.btn-save:disabled { opacity: .5; cursor: not-allowed; }

/* ASIGNAR */
.asign-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: 7px; cursor: pointer; transition: all .15s; }
.asign-item:hover { border-color: var(--green-mid); background: #F0FAF6; }
.asign-item.selected { border-color: var(--green-mid); background: var(--green-bg); }
.asign-name { font-weight: 600; font-size: 13px; }
.asign-sub { font-size: 12px; color: var(--text2); }

/* CONSIG */
.consig-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 0; border-bottom: 1px solid var(--border); }
.consig-item:last-child { border-bottom: none; }
.consig-monto { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 700; color: var(--green); white-space: nowrap; }

/* STEPS (setup modal) */
.step { display: flex; gap: 12px; margin-bottom: 16px; }
.step-num { width: 24px; height: 24px; border-radius: 50%; background: #1A1814; color: white; font-size: 12px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
.step-body { flex: 1; }
.step-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
.step-desc { font-size: 12px; color: var(--text2); line-height: 1.6; }
.step-desc code { background: var(--surface2); padding: 1px 5px; border-radius: 4px; font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--text); }
.copy-btn { background: var(--surface2); border: 1px solid var(--border2); border-radius: 5px; padding: 3px 8px; font-size: 11px; font-family: inherit; cursor: pointer; margin-top: 5px; }
.copy-btn:hover { background: var(--border); }

.empty { text-align: center; padding: 40px; color: var(--text3); }
.empty i { font-size: 38px; display: block; margin-bottom: 8px; opacity: .3; }

/* LOADING */
.loading-overlay { position: fixed; inset: 0; background: rgba(245,243,238,.8); display: flex; align-items: center; justify-content: center; z-index: 300; flex-direction: column; gap: 12px; }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border2); border-top-color: var(--green-mid); border-radius: 50%; animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="topbar">
  <h1><i class="ti ti-currency-dollar"></i> Control de Intereses</h1>
  <div class="topbar-right">
    <div class="sync-status" id="sync-status">
      <div class="sync-dot" id="sync-dot"></div>
      <span id="sync-text">Conectando...</span>
    </div>
    <button class="btn-top" onclick="abrirModalDinero()"><i class="ti ti-cash"></i> Registrar dinero</button>
    <button class="btn-top accent" onclick="abrirModalPrestamo()"><i class="ti ti-plus"></i> Nuevo préstamo</button>
  </div>
</div>

<div class="main">
  <div id="setup-banner"></div>
  <div class="summary" id="summary"></div>
  <div id="libre-banner"></div>
  <div id="dinero-section"></div>
  <div class="tabs-wrap"><div class="tabs-scroll" id="tabs"></div></div>
  <div id="contenido"></div>
</div>

<div id="modal"></div>

<script>
// ─────────────────────────────────────────────────────────────────
// CONFIGURACIÓN — se llena automáticamente o se puede editar aquí
// ─────────────────────────────────────────────────────────────────
const CONFIG = {
  // Pega aquí la URL de tu Google Apps Script desplegado
  SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbxKn5pOhmBlEQmiJtj8evg9nGh3J2LoJKe8yO5TqGgr0P0wY_adbTv-ak7FNL_DgXQ-/exec',
};

const MESES_N = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
const MESES_C = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const COLORES_RESP = [
  {bg:'#CBF0E2',text:'#0A5E48'},{bg:'#D2E5F9',text:'#183E7A'},
  {bg:'#E5DDFB',text:'#3D1F8A'},{bg:'#FDEABF',text:'#6B3F07'},
  {bg:'#FBDADA',text:'#721B1B'},{bg:'#F0E4FB',text:'#6B1B8F'},
];

// ── Estado local ─────────────────────────────────────────────────
let S = {
  responsables: [], prestamos: [], dineroLibre: [],
  nextId: 1, nextDineroId: 1, tabActivo: 'todos', loaded: false,
};

// ── API Google Sheets ─────────────────────────────────────────────
async function apiCall(action, data={}) {
  if (!CONFIG.SCRIPT_URL) return null;
  setSyncStatus('syncing', 'Sincronizando...');
  try {
    const url = CONFIG.SCRIPT_URL + '?action=' + action;
    const res = await fetch(url, {
      method: 'POST',
      body: JSON.stringify(data),
    });
    const json = await res.json();
    setSyncStatus('ok', 'Sincronizado');
    return json;
  } catch(e) {
    setSyncStatus('error', 'Error al sincronizar');
    console.error('API error:', e);
    return null;
  }
}

async function cargarDatos() {
  if (!CONFIG.SCRIPT_URL) {
    setSyncStatus('error', 'Sin configurar');
    renderSetupBanner();
    render();
    return;
  }
  setSyncStatus('syncing', 'Cargando...');
  const data = await apiCall('getData');
  if (data && data.ok) {
    S.responsables = data.responsables || [];
    S.prestamos    = data.prestamos || [];
    S.dineroLibre  = data.dineroLibre || [];
    S.nextId       = data.nextId || 1;
    S.nextDineroId = data.nextDineroId || 1;
    S.loaded = true;
    setSyncStatus('ok', 'Sincronizado');
  } else {
    setSyncStatus('error', 'No se pudo cargar');
  }
  render();
}

async function guardarTodo() {
  if (!CONFIG.SCRIPT_URL) return;
  await apiCall('saveData', {
    responsables: S.responsables,
    prestamos: S.prestamos,
    dineroLibre: S.dineroLibre,
    nextId: S.nextId,
    nextDineroId: S.nextDineroId,
  });
}

function setSyncStatus(tipo, texto) {
  const dot = document.getElementById('sync-dot');
  const txt = document.getElementById('sync-text');
  if (!dot) return;
  dot.className = 'sync-dot' + (tipo !== 'ok' ? ' ' + tipo : '');
  txt.textContent = texto;
}

// ── Helpers ──────────────────────────────────────────────────────
const HOY = new Date(); HOY.setHours(0,0,0,0);
function fmt(n){ return '$' + Math.round(n).toLocaleString('es-CO'); }
function fechaDisp(f){ if(!f)return''; const[y,m,d]=f.split('-'); return`${d}/${m}/${y}`; }
function diasHoy(f){ return Math.round((new Date(f+'T00:00:00') - HOY) / 86400000); }
function diaCobro(p){ return parseInt(p.fecha_inicio.split('-')[2]); }

function ordenarCobros(cobros){
  const prio={vencido:0,pendiente:1,pagado:2};
  return [...cobros].sort((a,b)=>{
    if(prio[a.estado]!==prio[b.estado]) return prio[a.estado]-prio[b.estado];
    return new Date(a.fecha_cobro)-new Date(b.fecha_cobro);
  });
}

function getDias(){
  const dias=new Set();
  S.prestamos.forEach(p=>dias.add(diaCobro(p)));
  return Array.from(dias).sort((a,b)=>a-b);
}

function prestsFiltrados(){
  if(S.tabActivo==='todos') return S.prestamos;
  return S.prestamos.filter(p=>diaCobro(p)===S.tabActivo);
}

function pendientesDia(dia){
  return S.prestamos.filter(p=>diaCobro(p)===dia)
    .reduce((s,p)=>s+p.cobros.filter(c=>c.estado!=='pagado').length,0);
}

function colorResp(idx){ return COLORES_RESP[idx % COLORES_RESP.length]; }

// ── Stats ────────────────────────────────────────────────────────
function calcStats(){
  let capital=0,cobrado=0,pendiente=0,vencido=0,libre=0;
  S.prestamos.forEach(p=>{
    capital+=p.capital;
    p.cobros.forEach(c=>{
      if(c.estado==='pagado') cobrado+=c.monto;
      else if(c.estado==='pendiente') pendiente+=c.monto;
      else vencido+=c.monto;
    });
  });
  S.dineroLibre.forEach(d=>{
    const a=(d.asignaciones||[]).reduce((s,x)=>s+x.monto,0);
    libre+=d.monto-a;
  });
  return{capital,cobrado,pendiente,vencido,libre};
}

// ── Helpers de meses ────────────────────────────────────────────
function getCuotaParaMes(p, mes, anio){
  const desembolsos=p.desembolsos||[{monto:p.capital,fecha:p.fecha_inicio}];
  // Solo suma los desembolsos que ocurrieron en o antes de este mes
  const capital=desembolsos.filter(d=>{
    const df=new Date(d.fecha+'T00:00:00');
    const dy=df.getFullYear(), dm=df.getMonth()+1;
    return dy<anio||(dy===anio&&dm<=mes);
  }).reduce((s,d)=>s+d.monto,0);
  return Math.round(capital*(p.tasa_pct||2)/100);
}

function getMesesPrestamo(p){
  const ocultos=p.mesesOcultos||[];
  const esOculto=(m,y)=>ocultos.some(o=>o.mes===m&&o.anio===y);
  const inicio=new Date(p.fecha_inicio+'T00:00:00');
  const hoyDate=new Date();
  let y=inicio.getFullYear(), m=inicio.getMonth()+1;
  const hy=hoyDate.getFullYear(), hm=hoyDate.getMonth()+1;
  const result=[];
  while(y<hy||(y===hy&&m<=hm)){
    if(!esOculto(m,y)){
      const cobro=(p.cobros||[]).find(c=>c.mes===m&&c.anio===y)||null;
      result.push({mes:m,anio:y,cobro});
    }
    m++; if(m>12){m=1;y++;}
  }
  // Meses futuros agregados manualmente (más allá de hoy)
  (p.cobros||[]).forEach(c=>{
    const esFuturo=c.anio>hy||(c.anio===hy&&c.mes>hm);
    if(esFuturo&&!esOculto(c.mes,c.anio)&&!result.find(r=>r.mes===c.mes&&r.anio===c.anio)){
      result.push({mes:c.mes,anio:c.anio,cobro:c});
    }
  });
  return result;
}

// ── Acciones con sync ────────────────────────────────────────────
async function toggleCobro(pid,mes,anio){
  const p=S.prestamos.find(x=>x.id===pid);
  const cobro=(p.cobros||[]).find(c=>c.mes===mes&&c.anio===anio);
  if(cobro){
    cobro.estado=cobro.estado==='pagado'?'pendiente':'pagado';
  } else {
    const dia=diaCobro(p);
    const fc=anio+'-'+String(mes).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
    p.cobros.push({id:'c'+S.nextId++,mes,anio,monto:getCuotaParaMes(p,mes,anio),estado:'pagado',fecha_cobro:fc});
  }
  render();
  await guardarTodo();
}

async function eliminarCobro(pid,cid){
  const p=S.prestamos.find(x=>x.id===pid);
  const cobro=p.cobros.find(c=>c.id===cid);
  if(cobro){
    if(!p.mesesOcultos) p.mesesOcultos=[];
    p.mesesOcultos.push({mes:cobro.mes,anio:cobro.anio});
    p.cobros=p.cobros.filter(c=>c.id!==cid);
  }
  render();
  await guardarTodo();
}

async function ocultarMes(pid,mes,anio){
  const p=S.prestamos.find(x=>x.id===pid);
  if(!p.mesesOcultos) p.mesesOcultos=[];
  p.mesesOcultos.push({mes,anio});
  render();
  await guardarTodo();
}

async function agregarMesSiguiente(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const meses=getMesesPrestamo(p);
  let nm, ny;
  if(meses.length){
    const last=meses[meses.length-1];
    nm=last.mes+1; ny=last.anio;
    if(nm>12){nm=1;ny++;}
  } else {
    const hoy=new Date();
    nm=hoy.getMonth()+2; ny=hoy.getFullYear();
    if(nm>12){nm=1;ny++;}
  }
  const dia=diaCobro(p);
  const fc=ny+'-'+String(nm).padStart(2,'0')+'-'+String(dia).padStart(2,'0');
  p.cobros.push({id:'c'+S.nextId++,mes:nm,anio:ny,monto:getCuotaParaMes(p,nm,ny),estado:'pendiente',fecha_cobro:fc});
  render();
  await guardarTodo();
}

async function marcarPagado(pid,cid){
  const p=S.prestamos.find(x=>x.id===pid);
  const c=p.cobros.find(x=>x.id===cid);
  if(c) c.estado='pagado';
  render();
  await guardarTodo();
}

async function eliminarPrestamo(id){
  if(!confirm('¿Eliminar este préstamo?')) return;
  S.prestamos=S.prestamos.filter(x=>x.id!==id);
  render();
  await guardarTodo();
}

function copiarScript(){
  const code = `const SHEET_ID = SpreadsheetApp.getActiveSpreadsheet().getId();

function doPost(e) {
  const action = e.parameter.action;
  const data = JSON.parse(e.postData.contents || '{}');
  let result;
  try {
    if (action === 'getData') result = getData();
    else if (action === 'saveData') result = saveData(data);
    else result = { ok: false, error: 'Acción desconocida' };
  } catch(err) {
    result = { ok: false, error: err.toString() };
  }
  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function doGet(e) {
  return doPost(e);
}

function getData() {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  let sheet = ss.getSheetByName('datos');
  if (!sheet) {
    sheet = ss.insertSheet('datos');
    sheet.getRange('A1').setValue('{}');
  }
  const raw = sheet.getRange('A1').getValue();
  const parsed = raw ? JSON.parse(raw) : {};
  return { ok: true, ...parsed };
}

function saveData(data) {
  const ss = SpreadsheetApp.openById(SHEET_ID);
  let sheet = ss.getSheetByName('datos');
  if (!sheet) sheet = ss.insertSheet('datos');
  sheet.getRange('A1').setValue(JSON.stringify(data));
  
  // También escribe hojas legibles
  actualizarHojasLegibles(ss, data);
  return { ok: true };
}

function actualizarHojasLegibles(ss, data) {
  // Hoja de resumen de préstamos
  let hPrests = ss.getSheetByName('préstamos');
  if (!hPrests) hPrests = ss.insertSheet('préstamos');
  hPrests.clearContents();
  hPrests.getRange(1,1,1,7).setValues([['Responsable','Descripción','Tipo','Capital','Fecha inicio','Día cobro','Cuota mensual']]);
  if (data.prestamos && data.prestamos.length) {
    const rows = data.prestamos.map(p => {
      const resp = (data.responsables||[]).find(r=>r.id===p.responsableId);
      return [resp?resp.nombre:'', p.desc, p.tipo, p.capital, p.fecha_inicio,
              parseInt((p.fecha_inicio||'').split('-')[2]||0), p.tasa_mensual||0];
    });
    hPrests.getRange(2,1,rows.length,7).setValues(rows);
  }
  
  // Hoja de cobros
  let hCobros = ss.getSheetByName('cobros');
  if (!hCobros) hCobros = ss.insertSheet('cobros');
  hCobros.clearContents();
  hCobros.getRange(1,1,1,6).setValues([['Responsable','Préstamo','Mes','Año','Monto','Estado']]);
  const meses = ['','Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const allCobros = [];
  (data.prestamos||[]).forEach(p => {
    const resp = (data.responsables||[]).find(r=>r.id===p.responsableId);
    (p.cobros||[]).forEach(c => {
      allCobros.push([resp?resp.nombre:'', p.desc, meses[c.mes]||c.mes, c.anio, c.monto, c.estado]);
    });
  });
  if (allCobros.length) hCobros.getRange(2,1,allCobros.length,6).setValues(allCobros);
}`;
  navigator.clipboard.writeText(code).then(()=>{
    const btn=document.querySelector('.copy-btn');
    if(btn){btn.textContent='✓ Copiado';setTimeout(()=>{btn.innerHTML='<i class="ti ti-copy" style="font-size:12px;vertical-align:-1px"></i> Copiar código';},2000);}
  });
}

}

function actualizarCuota(){
  const capital=parseFloat(document.getElementById('p-capital')?.value)||0;
  const tasa=parseFloat(document.getElementById('p-tasa')?.value)||0;
  const cuota=Math.round(capital*tasa/100);
  const el=document.getElementById('p-cuota-display');
  if(el) el.value=cuota>0?fmt(cuota):'';
}

function toggleNuevoResp(v){ document.getElementById('p-nuevo-wrap').style.display=v==='nuevo'?'block':'none'; }

function actualizarHint(){
  const f=document.getElementById('p-fecha');
  const h=document.getElementById('p-hint');
  if(!f||!h)return;
  const dia=f.value?parseInt(f.value.split('-')[2]):'';
  h.innerHTML=dia?`<i class="ti ti-calendar-repeat" style="vertical-align:-2px;margin-right:5px"></i>Se cobrará el <strong>día ${dia}</strong> de cada mes`:'';
  h.style.display=dia?'block':'none';
}

async function guardarPrestamo(){
  const respEl=document.getElementById('p-resp');
  const rv=respEl?respEl.value:'nuevo';
  const capital=parseFloat(document.getElementById('p-capital').value)||0;
  const tasa=parseFloat(document.getElementById('p-tasa').value)||2;
  const fecha=document.getElementById('p-fecha').value;
  if(!capital||!fecha){alert('Completa capital y fecha');return;}
  const cuota=Math.round(capital*tasa/100);
  let rid;
  if(rv==='nuevo'){
    const nn=document.getElementById('p-nuevo-nombre').value.trim();
    if(!nn){alert('Ingresa el nombre del responsable');return;}
    rid=S.nextId++;
    S.responsables.push({id:rid,nombre:nn,color:COLORES_RESP[S.responsables.length%COLORES_RESP.length]});
  } else { rid=parseInt(rv); }
  const id=S.nextId++;
  S.prestamos.push({
    id,responsableId:rid,desc:'Préstamo',tipo:'Intereses',capital,
    fecha_inicio:fecha,tasa_mensual:cuota,tasa_pct:tasa,
    desembolsos:[{id:'d'+S.nextId++,monto:capital,fecha}],
    consignaciones:[{id:S.nextId++,desc:'Ingreso inicial',monto:capital,fecha}],
    cobros:[]
  });
  cerrar(); render();
  await guardarTodo();
}

// ── Modal: Agregar capital a préstamo existente ───────────────────
function abrirAgregarCapital(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const hoy=new Date().toISOString().split('T')[0];
  const tasa=p.tasa_pct||2;
  modal('Agregar más plata',
    '<p style="font-size:13px;color:var(--text2);margin-bottom:14px">Capital actual: <strong style="font-family:\'IBM Plex Mono\',monospace">'+fmt(p.capital)+'</strong> · Tasa: '+tasa+'%</p>'+
    '<div class="form-group"><label>Monto adicional ($)</label>'+
      '<input id="ca-monto" type="number" placeholder="5000000" oninput="actualizarCuotaAdicional('+pid+')">'+
    '</div>'+
    '<div class="form-group"><label>Fecha del desembolso</label>'+
      '<input id="ca-fecha" type="date" value="'+hoy+'">'+
    '</div>'+
    '<div style="background:var(--surface2);border-radius:7px;padding:9px 12px;font-size:13px;" id="ca-preview">'+
      'Nuevo capital: — · Nueva cuota: —'+
    '</div>',
    '<button class="btn-cancel" onclick="cerrar()">Cancelar</button>'+
    '<button class="btn-save" onclick="guardarCapitalAdicional('+pid+')">Agregar</button>'
  );
}

function actualizarCuotaAdicional(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const adicional=parseFloat(document.getElementById('ca-monto')?.value)||0;
  const tasa=p.tasa_pct||2;
  const nuevoCapital=p.capital+adicional;
  const nuevaCuota=Math.round(nuevoCapital*tasa/100);
  const el=document.getElementById('ca-preview');
  if(el) el.innerHTML=adicional>0
    ?'Nuevo capital: <strong style="font-family:\'IBM Plex Mono\',monospace">'+fmt(nuevoCapital)+'</strong> · Nueva cuota: <strong style="font-family:\'IBM Plex Mono\',monospace;color:var(--green)">'+fmt(nuevaCuota)+'</strong>'
    :'Nuevo capital: — · Nueva cuota: —';
}

async function guardarCapitalAdicional(pid){
  const monto=parseFloat(document.getElementById('ca-monto').value)||0;
  const fecha=document.getElementById('ca-fecha').value;
  if(!monto||!fecha){alert('Completa monto y fecha');return;}
  const p=S.prestamos.find(x=>x.id===pid);
  if(!p.desembolsos) p.desembolsos=[{id:'d'+S.nextId++,monto:p.capital,fecha:p.fecha_inicio}];
  p.desembolsos.push({id:'d'+S.nextId++,monto,fecha});
  p.capital=p.desembolsos.reduce((s,d)=>s+d.monto,0);
  p.tasa_mensual=Math.round(p.capital*(p.tasa_pct||2)/100);
  cerrar(); render();
  await guardarTodo();
}

// ── Modal: Agregar cobro ──────────────────────────────────────────
function abrirAgregarCobro(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const dia=diaCobro(p);
  modal(`Agregar cobro — ${p.desc}`,`
    <div style="background:var(--surface2);border-radius:7px;padding:9px 12px;margin-bottom:14px;font-size:13px;color:var(--text2)">
      <i class="ti ti-calendar-repeat" style="vertical-align:-2px;margin-right:5px"></i>
      Día de cobro: <strong style="color:var(--text)">día ${dia} de cada mes</strong>
    </div>
    <div class="form-row">
      <div class="form-group"><label>Mes</label><select id="ac-mes">${MESES_N.map((m,i)=>`<option value="${i+1}">${m}</option>`).join('')}</select></div>
      <div class="form-group"><label>Año</label><input id="ac-anio" type="number" value="${new Date().getFullYear()}"></div>
    </div>
    <div class="form-group"><label>Monto ($)</label><input id="ac-monto" type="number" value="${p.tasa_mensual||''}"></div>
    <div class="form-group"><label>Estado</label>
      <select id="ac-estado">
        <option value="pendiente">Pendiente</option>
        <option value="pagado">Pagado</option>
        <option value="vencido">Vencido</option>
      </select>
    </div>`,
    `<button class="btn-cancel" onclick="cerrar()">Cancelar</button>
     <button class="btn-save" onclick="guardarCobro(${pid})">Guardar</button>`
  );
}

async function guardarCobro(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const mes=parseInt(document.getElementById('ac-mes').value);
  const anio=parseInt(document.getElementById('ac-anio').value)||2025;
  const monto=parseFloat(document.getElementById('ac-monto').value)||0;
  const estado=document.getElementById('ac-estado').value;
  const dia=diaCobro(p);
  const fc=`${anio}-${String(mes).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
  p.cobros.push({id:'c'+S.nextId++,mes,anio,monto,estado,fecha_cobro:fc});
  cerrar(); render();
  await guardarTodo();
}

// ── Modal: Registrar dinero ───────────────────────────────────────
function abrirModalDinero(){
  modal('Registrar dinero recibido',`
    <p style="font-size:13px;color:var(--text2);margin-bottom:14px">Registra el monto recibido sin saber aún de qué préstamo es. Luego lo asignas cuando te confirmen.</p>
    <div class="form-group"><label>Descripción / Quién pagó</label><input id="d-desc" type="text" placeholder="Ej: Consignó Paola"></div>
    <div class="form-row">
      <div class="form-group"><label>Monto ($)</label><input id="d-monto" type="number" placeholder="500000"></div>
      <div class="form-group"><label>Fecha</label><input id="d-fecha" type="date" value="${new Date().toISOString().split('T')[0]}"></div>
    </div>`,
    `<button class="btn-cancel" onclick="cerrar()">Cancelar</button>
     <button class="btn-save" onclick="guardarDinero()">Registrar</button>`
  );
}

async function guardarDinero(){
  const desc=document.getElementById('d-desc').value.trim();
  const monto=parseFloat(document.getElementById('d-monto').value)||0;
  const fecha=document.getElementById('d-fecha').value;
  if(!monto){alert('Ingresa el monto');return;}
  S.dineroLibre.push({id:S.nextDineroId++,desc:desc||'Sin descripción',monto,fecha,asignaciones:[]});
  cerrar(); render();
  await guardarTodo();
}

// ── Modal: Asignar dinero ─────────────────────────────────────────
function abrirAsignar(dineroId){
  const d=S.dineroLibre.find(x=>x.id===dineroId);
  const asigT=(d.asignaciones||[]).reduce((s,x)=>s+x.monto,0);
  const saldo=d.monto-asigT;
  const opciones=[];
  S.prestamos.forEach(p=>{
    const resp=S.responsables.find(r=>r.id===p.responsableId);
    p.cobros.filter(c=>c.estado!=='pagado').forEach(c=>{
      const ya=(d.asignaciones||[]).find(a=>a.cobroId===c.id);
      opciones.push({p,c,resp,ya});
    });
  });
  const opHtml=opciones.length?opciones.map(o=>`
    <div class="asign-item${o.ya?' selected':''}" onclick="toggleAsig(${dineroId},'${o.c.id}',${o.p.id},${o.c.monto})">
      <div>
        <div class="asign-name">${o.resp?o.resp.nombre:''} — ${o.p.desc}</div>
        <div class="asign-sub">${MESES_N[o.c.mes-1]} ${o.c.anio} · ${o.c.estado}</div>
        ${o.ya?`<div style="font-size:11px;color:var(--green);font-weight:600">Asignado: ${fmt(o.ya.monto)}</div>`:''}
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;color:var(--amber)">${fmt(o.c.monto)}</div>
    </div>`).join('')
    :'<div style="font-size:13px;color:var(--text3);padding:8px 0">No hay cobros pendientes</div>';
  modal('Asignar dinero a un cobro',`
    <div style="background:var(--amber-bg);border:1px solid var(--amber-border);border-radius:8px;padding:10px 13px;margin-bottom:14px;display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:13px;color:var(--amber);font-weight:500">${d.desc}</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-size:15px;font-weight:700;color:var(--amber)">${fmt(saldo)}</span>
    </div>
    <div class="section-label" style="margin-bottom:8px">Cobros pendientes</div>${opHtml}`,
    `<button class="btn-cancel" onclick="cerrar()">Cerrar</button>
     <button class="btn-save" onclick="cerrar();render()">Listo</button>`
  );
}

async function toggleAsig(dineroId,cobroId,pid,montoCobro){
  const d=S.dineroLibre.find(x=>x.id===dineroId);
  const idx=(d.asignaciones||[]).findIndex(a=>a.cobroId===cobroId);
  if(idx>=0){ d.asignaciones.splice(idx,1); }
  else{
    const at=d.asignaciones.reduce((s,x)=>s+x.monto,0);
    const saldo=d.monto-at;
    const ma=Math.min(saldo,montoCobro);
    if(ma<=0){alert('Sin saldo disponible');return;}
    d.asignaciones.push({cobroId,pid,monto:ma});
    if(ma>=montoCobro){
      const p=S.prestamos.find(x=>x.id===pid);
      const c=p.cobros.find(x=>x.id===cobroId);
      if(c) c.estado='pagado';
    }
  }
  await guardarTodo();
  abrirAsignar(dineroId);
  render();
}

// ── Modal: Consignaciones ─────────────────────────────────────────
function abrirConsignaciones(pid){
  const p=S.prestamos.find(x=>x.id===pid);
  const total=p.consignaciones.reduce((a,c)=>a+c.monto,0);
  modal(`Consignaciones — ${p.desc}`,`
    <div style="background:var(--surface2);border-radius:7px;padding:9px 12px;margin-bottom:12px;display:flex;justify-content:space-between">
      <span style="font-size:13px;color:var(--text2)">Total consignado</span>
      <span style="font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px">${fmt(total)}</span>
    </div>
    ${p.consignaciones.map(c=>`<div class="consig-item">
      <div><div style="font-size:13px;font-weight:500">${c.desc}</div>
      <div style="font-size:11px;color:var(--text3)">${fechaDisp(c.fecha)}</div></div>
      <div class="consig-monto">${fmt(c.monto)}</div>
    </div>`).join('')}`,
    `<button class="btn-cancel" onclick="cerrar()">Cerrar</button>
     <button class="btn-save" onclick="cerrar();abrirModalDinero()">Registrar ingreso</button>`
  );
}

// ── Init ─────────────────────────────────────────────────────────
cargarDatos();
</script>
</body>
